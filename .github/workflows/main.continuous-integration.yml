name: Main Continuous Integration

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

concurrency:
    group: branch-main

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Generate Token
              id: generate_token
              uses: tibdex/github-app-token@v1
              with:
                  app_id: ${{ vars.TOKEN_APP_ID }}
                  private_key: ${{ secrets.TOKEN_APP_PRIVATE_KEY }}
            - name: Upgrade npm
              run: npm install -g npm@latest
            - uses: actions/checkout@v3
              with:
                  fetch-depth: 5
                  token: ${{ steps.generate_token.outputs.token }}
            - uses: actions/setup-node@v3
              with:
                  node-version: 18
            - name: Setup
              run: |
                  yarn install
                  git tag baseline HEAD^
                  echo Using baseline:
                  git log -1 --oneline baseline
            - name: Build
              run: yarn build --filter=...[baseline]
            - name: Publish
              run: |
                  git config user.name "GitHub Actions Bot"
                  git config user.email "<>"
                  npx turbo run release --concurrency 1 --filter=...[baseline] -- --prerelease internal --skip.tag --skip.changelog
                  npx turbo run deploy --filter=...[baseline] -- --tag internal
